#cloud-config
hostname: ${hostname}
fqdn: ${hostname}.local
manage_etc_hosts: true

disable_root: true
ssh_pwauth: false

users:
  - default
  - name: assmin
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo
    shell: /bin/bash
    lock_passwd: false
    ssh_authorized_keys:
      - ${ssh_key}

packages:
  - qemu-guest-agent

runcmd:
  - systemctl enable --now qemu-guest-agent

